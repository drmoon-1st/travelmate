<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TravelMate Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body data-page="booking">

<header>
  <h1>TravelMate</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="destinations.html">Destinations</a>
    <a href="matching.html">Matching</a>
    <a href="booking.html">Booking</a>
    <a href="reviews.html">Reviews</a>
    <a href="chat.html">Chat</a>
    <a href="about.html">About</a>
    <div class="auth-buttons" id="authButtons">
      <button class="signin-btn" onclick="openSignin()">Sign In</button>
      <button class="signup-btn" onclick="openSignup()">Sign Up</button>
    </div>
    <div class="user-menu" id="userMenu">
      <span id="userGreeting"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </nav>
</header>

<main class="page-container">
  <h2 style="color:#2563eb; text-align:center;">여행 예약</h2>
  <div class="booking-form">
    <label for="bookingDestination">여행지</label>
    <select id="bookingDestination"></select>
    <label for="startDate">출발 날짜</label>
    <input type="date" id="startDate">
    <label for="endDate">도착 날짜</label>
    <input type="date" id="endDate">
    <label for="numTravelers">여행 인원</label>
    <input type="number" id="numTravelers" min="1" value="1">
    <div id="costSummary" class="booking-summary"></div>
    <button onclick="confirmBooking()">예약하기</button>
  </div>
  <div style="margin-top:40px;">
    <h3 style="color:#2563eb;">내 예약 내역</h3>
    <div id="bookingHistory"></div>
  </div>
  <p style="margin-top:24px; font-size:14px; color:#6b7280;">* 예상 비용은 숙박, 교통 및 부대비용을 간단히 계산한 것입니다. 실제 비용과는 차이가 있을 수 있습니다.</p>
  
</main>

<!-- Sign In Modal -->
<div id="signinModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeSignin()">&times;</span>
    <h2>Sign In</h2>
    <input type="text" id="signinId" placeholder="아이디">
    <input type="password" id="signinPw" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
  </div>
</div>
<!-- Sign Up Modal -->
<div id="signupModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeSignup()">&times;</span>
    <h2>Sign Up</h2>
    <input type="text" id="signupName" placeholder="이름">
    <input type="text" id="signupId" placeholder="아이디">
    <input type="password" id="signupPw" placeholder="비밀번호">
    <input type="number" id="signupAge" placeholder="나이">
    <button onclick="signup()">회원가입</button>
  </div>
</div>

</body>
</html>
