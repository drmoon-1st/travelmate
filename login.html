<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TravelMate Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="login-box">
    <h1>TravelMate</h1>
    <p>여행 동행자를 찾아보세요</p>

    <!-- Use the same IDs as sign‑in modal to reuse login() logic -->
    <input id="signinId" type="text" placeholder="아이디">
    <input id="signinPw" type="password" placeholder="비밀번호">

    <button onclick="login()">로그인</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
