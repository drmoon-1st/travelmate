<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TravelMate Reviews</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body data-page="reviews">

<header>
  <h1>TravelMate</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="destinations.html">Destinations</a>
    <a href="matching.html">Matching</a>
    <a href="booking.html">Booking</a>
    <a href="reviews.html">Reviews</a>
    <a href="chat.html">Chat</a>
    <a href="about.html">About</a>
    <div class="auth-buttons" id="authButtons">
      <button class="signin-btn" onclick="openSignin()">Sign In</button>
      <button class="signup-btn" onclick="openSignup()">Sign Up</button>
    </div>
    <div class="user-menu" id="userMenu">
      <span id="userGreeting"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </nav>
</header>

<main class="page-container">
  <h2 style="color:#2563eb; text-align:center;">여행 후기</h2>
  <p style="text-align:center; margin-bottom:24px;">방문한 여행지에 대한 별점과 후기를 남겨보세요.</p>
  <div class="review-form">
    <label for="reviewDestination">여행지</label>
    <select id="reviewDestination"></select>
    <label for="reviewRating">별점</label>
    <select id="reviewRating">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
    <label for="reviewComment">후기</label>
    <textarea id="reviewComment" rows="4" placeholder="후기를 작성해주세요"></textarea>
    <button onclick="submitReview()">후기 제출</button>
  </div>
  <div style="margin-top:40px;" class="review-list">
    <label for="reviewFilter">후기 보기</label>
    <select id="reviewFilter" style="margin-top:6px; margin-bottom:12px;"></select>
    <div id="reviewList"></div>
  </div>
</main>

<!-- Sign In Modal -->
<div id="signinModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeSignin()">&times;</span>
    <h2>Sign In</h2>
    <input type="text" id="signinId" placeholder="아이디">
    <input type="password" id="signinPw" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
  </div>
</div>
<!-- Sign Up Modal -->
<div id="signupModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeSignup()">&times;</span>
    <h2>Sign Up</h2>
    <input type="text" id="signupName" placeholder="이름">
    <input type="text" id="signupId" placeholder="아이디">
    <input type="password" id="signupPw" placeholder="비밀번호">
    <input type="number" id="signupAge" placeholder="나이">
    <button onclick="signup()">회원가입</button>
  </div>
</div>

</body>
</html>
