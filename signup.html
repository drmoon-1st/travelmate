<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TravelMate Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-box">
  <h1>회원가입</h1>

  <input id="signupName" type="text" placeholder="이름">
  <input id="signupId" type="text" placeholder="아이디">
  <input id="signupPw" type="password" placeholder="비밀번호">
  <input id="signupAge" type="number" placeholder="나이">

  <button onclick="signup()">회원가입</button>
  <button onclick="location.href='index.html'">메인으로</button>
</div>

<script src="script.js"></script>
</body>
</html>
